<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Rock Paper Scissors</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f0f0ec;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ── Top panel ─────────────────────────────────── */
    #top-panel {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: #e4e4e0;
      border-bottom: 1px solid #ccc;
    }

    #top-panel button {
      flex: 1;
      height: 48px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    #top-panel button:active { opacity: 0.7; }

    #btn-start {
      background: #22c55e;
      color: #fff;
    }
    #btn-start:disabled {
      background: #86efac;
      cursor: default;
    }

    #btn-pause {
      background: #fff;
      color: #333;
      border: 1.5px solid #ccc !important;
    }
    #btn-pause.active {
      background: #fef9c3;
      border-color: #ca8a04 !important;
      color: #92400e;
    }

    #btn-restart {
      background: #fff;
      color: #333;
      border: 1.5px solid #ccc !important;
    }

    /* ── Arena ─────────────────────────────────────── */
    #arena-container {
      position: relative;
      width: 100%;
      flex-shrink: 0;
    }

    canvas {
      display: block;
      width: 100%;
      max-width: 500px;
      background: #fff;
      border-bottom: 1px solid #ccc;
    }

    #arena-container {
      display: flex;
      justify-content: center;
    }

    #scores {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      background: rgba(255,255,255,0.88);
      padding: 6px 20px;
      border-radius: 20px;
      border: 1px solid #ddd;
      pointer-events: none;
      white-space: nowrap;
    }

    .score-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 700;
      color: #333;
    }

    /* ── Controls ──────────────────────────────────── */
    #controls {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .slider-label {
      font-size: 15px;
      font-weight: 600;
      color: #444;
      width: 52px;
      flex-shrink: 0;
    }

    .slider-row input[type=range] {
      flex: 1;
      height: 6px;
      cursor: pointer;
      accent-color: #22c55e;
    }

    .slider-value {
      font-size: 15px;
      font-weight: 600;
      color: #555;
      width: 32px;
      text-align: right;
      flex-shrink: 0;
    }

    #fps {
      font-size: 12px;
      color: #999;
      text-align: center;
      padding-bottom: 8px;
    }

    /* ── Upload section ────────────────────────────── */
    .section-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2px 0;
    }

    .section-toggle span {
      font-size: 15px;
      font-weight: 600;
      color: #444;
    }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 26px;
      flex-shrink: 0;
    }

    .toggle-switch input { opacity: 0; width: 0; height: 0; }

    .toggle-switch .track {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-switch .track::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle-switch input:checked + .track { background: #22c55e; }
    .toggle-switch input:checked + .track::after { transform: translateX(18px); }

    #upload-panel {
      display: none;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
    }

    #upload-panel.visible { display: flex; }

    .upload-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #file-input {
      flex: 1;
      font-size: 14px;
      color: #444;
    }

    #btn-remove-logo {
      padding: 6px 14px;
      border: 1.5px solid #f87171;
      border-radius: 8px;
      background: #fff;
      color: #dc2626;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: none;
    }
    #btn-remove-logo:active { opacity: 0.7; }

    #position-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    #position-grid button {
      height: 40px;
      border: 1.5px solid #ccc;
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      font-weight: 500;
      color: #444;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    #position-grid button:active { opacity: 0.7; }

    #position-grid button.selected {
      background: #dcfce7;
      border-color: #22c55e;
      color: #15803d;
      font-weight: 700;
    }
  </style>
</head>
<body>

<div id="top-panel">
  <button id="btn-start">▶ Start</button>
  <button id="btn-pause">⏸ Pause</button>
  <button id="btn-restart">↺ Restart</button>
</div>

<div id="arena-container">
  <canvas id="canvas"></canvas>
  <div id="scores">
    <div class="score-item"><span>🪨</span><span id="score-rock">0</span></div>
    <div class="score-item"><span>📄</span><span id="score-paper">0</span></div>
    <div class="score-item"><span>✂️</span><span id="score-scissors">0</span></div>
  </div>
</div>

<div id="controls">
  <div class="slider-row">
    <span class="slider-label">Count</span>
    <input type="range" id="sl-count" min="3" max="300" value="90">
    <span class="slider-value" id="lbl-count">90</span>
  </div>
  <div class="slider-row">
    <span class="slider-label">Speed</span>
    <input type="range" id="sl-speed" min="1" max="10" step="1" value="5">
    <span class="slider-value" id="lbl-speed">5</span>
  </div>
  <div class="slider-row">
    <span class="slider-label">Size</span>
    <input type="range" id="sl-size" min="12" max="48" value="22">
    <span class="slider-value" id="lbl-size">22</span>
  </div>
  <div id="fps">-- FPS</div>

  <div class="section-toggle">
    <span>Upload image</span>
    <label class="toggle-switch">
      <input type="checkbox" id="toggle-upload">
      <span class="track"></span>
    </label>
  </div>

  <div id="upload-panel">
    <div class="upload-row">
      <input type="file" id="file-input" accept="image/*">
      <button id="btn-remove-logo">Remove</button>
    </div>
    <div class="slider-row">
      <span class="slider-label">Opacity</span>
      <input type="range" id="sl-logo-opacity" min="0" max="100" step="5" value="100">
      <span class="slider-value" id="lbl-logo-opacity">100%</span>
    </div>
    <div id="position-grid">
      <button data-pos="top-left">Top left</button>
      <button data-pos="top-center">Top center</button>
      <button data-pos="top-right">Top right</button>
      <button data-pos="mid-left">Mid left</button>
      <button data-pos="mid-center" class="selected">Mid center</button>
      <button data-pos="mid-right">Mid right</button>
      <button data-pos="bottom-left">Bot left</button>
      <button data-pos="bottom-center">Bot center</button>
      <button data-pos="bottom-right">Bot right</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const DEFAULTS = { count: 90, speed: 5, size: 22 };
const cfg = { ...DEFAULTS };

let pieces = [];
let paused = true;
let started = false;
let dragIndex = null;
let winner = null;
let arenaSize = 375;

const TYPES = ['rock', 'paper', 'scissors'];
const EMOJI = { rock: '🪨', paper: '📄', scissors: '✂️' };
const BEATS = { rock: 'scissors', paper: 'rock', scissors: 'paper' };
const LOSES_TO = { rock: 'paper', paper: 'scissors', scissors: 'rock' };

function resize() {
  arenaSize = Math.min(500, document.getElementById('arena-container').clientWidth);
  canvas.width = arenaSize;
  canvas.height = arenaSize;
}

function randomPos() {
  const pad = cfg.size;
  return {
    x: pad + Math.random() * (arenaSize - pad * 2),
    y: pad + Math.random() * (arenaSize - pad * 2),
  };
}

function initPieces() {
  winner = null;
  pieces = [];
  for (let i = 0; i < cfg.count; i++) {
    const pos = randomPos();
    pieces.push({
      type: TYPES[i % 3],
      x: pos.x, y: pos.y,
      px: pos.x, py: pos.y,
    });
  }
}

function findNearest(from, targetType, samples = 12) {
  let best = null, bestDist = Infinity;
  const n = pieces.length;
  for (let s = 0; s < samples; s++) {
    const p = pieces[Math.floor(Math.random() * n)];
    if (p === from || p.type !== targetType) continue;
    const dx = p.x - from.x, dy = p.y - from.y;
    const d = dx * dx + dy * dy;
    if (d < bestDist) { bestDist = d; best = p; }
  }
  // When targets are rare the random sample often misses — fall back to full scan
  if (!best) {
    for (const p of pieces) {
      if (p === from || p.type !== targetType) continue;
      const dx = p.x - from.x, dy = p.y - from.y;
      const d = dx * dx + dy * dy;
      if (d < bestDist) { bestDist = d; best = p; }
    }
  }
  return best;
}

function normalize(dx, dy) {
  const len = Math.sqrt(dx * dx + dy * dy) || 1;
  return [dx / len, dy / len];
}

function update() {
  const speed = cfg.speed * 0.2;
  const repelSpeed = speed * 0.6;
  const half = cfg.size / 2;

  // Dominance per type — drives separation strength
  const typeCounts = { rock: 0, paper: 0, scissors: 0 };
  for (const p of pieces) typeCounts[p.type]++;

  const sepRadius2 = (cfg.size * 5) ** 2;
  const total = pieces.length;

  for (let i = 0; i < pieces.length; i++) {
    const p = pieces[i];
    if (dragIndex === i) continue;

    p.px = p.x; p.py = p.y;

    const prey = findNearest(p, BEATS[p.type]);
    const predator = findNearest(p, LOSES_TO[p.type]);

    let ax = 0, ay = 0;

    // Endgame scaling: minority flees less, majority hunts faster
    const myFraction   = typeCounts[p.type]         / total;
    const preyFraction = typeCounts[BEATS[p.type]]  / total;
    const fleeScale = myFraction   < 0.1 ? 0.3 + (myFraction   / 0.1) * 0.7 : 1;
    const huntScale = preyFraction < 0.1 ? 1   + (1 - preyFraction / 0.1) * 0.8 : 1;

    if (prey) {
      const [nx, ny] = normalize(prey.x - p.x, prey.y - p.y);
      ax += nx * speed * huntScale;
      ay += ny * speed * huntScale;
    }

    if (predator) {
      const [nx, ny] = normalize(predator.x - p.x, predator.y - p.y);
      ax -= nx * repelSpeed * fleeScale;
      ay -= ny * repelSpeed * fleeScale;
    }

    // Separation from same-type — scales with dominance so majority spreads out to hunt
    const dominance = typeCounts[p.type] / pieces.length;
    if (dominance > 0.4) {
      const sepForce = speed * (dominance - 0.4) * 2;
      for (let s = 0; s < 6; s++) {
        const q = pieces[Math.floor(Math.random() * pieces.length)];
        if (q === p || q.type !== p.type) continue;
        const dx = p.x - q.x, dy = p.y - q.y;
        const d2 = dx * dx + dy * dy;
        if (d2 < sepRadius2 && d2 > 0) {
          const [nx, ny] = normalize(dx, dy);
          ax += nx * sepForce;
          ay += ny * sepForce;
          break;
        }
      }
    }

    // Wall repulsion — prevents pieces pinning in corners
    const wallZone = cfg.size * 3;
    const wallForce = speed * 0.8;
    if (p.x < wallZone) ax += wallForce * (1 - p.x / wallZone);
    if (p.x > arenaSize - wallZone) ax -= wallForce * (1 - (arenaSize - p.x) / wallZone);
    if (p.y < wallZone) ay += wallForce * (1 - p.y / wallZone);
    if (p.y > arenaSize - wallZone) ay -= wallForce * (1 - (arenaSize - p.y) / wallZone);

    p.x += ax;
    p.y += ay;

    p.x = Math.max(half, Math.min(arenaSize - half, p.x));
    p.y = Math.max(half, Math.min(arenaSize - half, p.y));
  }

  const r = cfg.size * 0.7;
  const r2 = r * r;
  for (let i = 0; i < pieces.length - 1; i++) {
    for (let j = i + 1; j < pieces.length; j++) {
      const a = pieces[i], b = pieces[j];
      if (a.type === b.type) continue;
      const dx = a.x - b.x, dy = a.y - b.y;
      if (dx * dx + dy * dy > r2) continue;
      if (BEATS[a.type] === b.type) b.type = a.type;
      else a.type = b.type;
    }
  }

  if (!winner) {
    const first = pieces[0].type;
    if (pieces.every(p => p.type === first)) winner = first;
  }
}

function draw(blend) {
  ctx.clearRect(0, 0, arenaSize, arenaSize);

  drawLogo();

  ctx.font = `${cfg.size}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  for (const p of pieces) {
    const x = p.px + (p.x - p.px) * blend;
    const y = p.py + (p.y - p.py) * blend;
    ctx.fillText(EMOJI[p.type], x, y);
  }

  if (winner) {
    const cx = arenaSize / 2, cy = arenaSize / 2;
    const bw = Math.min(260, arenaSize * 0.7), bh = 130;

    ctx.fillStyle = 'rgba(255,255,255,0.93)';
    ctx.beginPath();
    ctx.roundRect(cx - bw / 2, cy - bh / 2, bw, bh, 14);
    ctx.fill();
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    ctx.font = `${Math.round(arenaSize * 0.1)}px serif`;
    ctx.fillStyle = '#000';
    ctx.fillText(EMOJI[winner], cx, cy - 20);

    ctx.font = `bold ${Math.round(arenaSize * 0.05)}px system-ui, sans-serif`;
    ctx.fillStyle = '#222';
    const label = winner.charAt(0).toUpperCase() + winner.slice(1);
    ctx.fillText(`${label} wins!`, cx, cy + 34);
  }


}

function updateScores() {
  let r = 0, pa = 0, s = 0;
  for (const p of pieces) {
    if (p.type === 'rock') r++;
    else if (p.type === 'paper') pa++;
    else s++;
  }
  document.getElementById('score-rock').textContent = r;
  document.getElementById('score-paper').textContent = pa;
  document.getElementById('score-scissors').textContent = s;
}

// Main loop
let last = performance.now();
let fpsLast = last;
let frames = 0;
const SIM_DT = 1000 / 45;
let accumulator = 0;

function loop(now) {
  requestAnimationFrame(loop);

  const dt = Math.min(now - last, 100);
  last = now;

  frames++;
  if (now - fpsLast >= 500) {
    document.getElementById('fps').textContent = Math.round(frames * 1000 / (now - fpsLast)) + ' FPS';
    frames = 0;
    fpsLast = now;
    updateScores();
  }

  if (started && !paused && !winner) {
    accumulator += dt;
    while (accumulator >= SIM_DT) {
      update();
      accumulator -= SIM_DT;
    }
  }

  draw(paused || !started ? 1 : accumulator / SIM_DT);
}

// Top panel buttons
const btnStart = document.getElementById('btn-start');
const btnPause = document.getElementById('btn-pause');

btnStart.addEventListener('click', () => {
  started = true;
  paused = false;
  winner = null;
  btnStart.disabled = true;
  btnPause.classList.remove('active');
  btnPause.textContent = '⏸ Pause';
});

btnPause.addEventListener('click', () => {
  if (!started) return;
  paused = !paused;
  btnPause.textContent = paused ? '▶ Resume' : '⏸ Pause';
  btnPause.classList.toggle('active', paused);
});

document.getElementById('btn-restart').addEventListener('click', () => {
  paused = true;
  started = false;
  btnStart.disabled = false;
  btnPause.textContent = '⏸ Pause';
  btnPause.classList.remove('active');
  initPieces();
});

// Sliders
document.getElementById('sl-count').addEventListener('input', function () {
  cfg.count = parseInt(this.value);
  document.getElementById('lbl-count').textContent = cfg.count;
  initPieces();
});

document.getElementById('sl-speed').addEventListener('input', function () {
  cfg.speed = parseInt(this.value);
  document.getElementById('lbl-speed').textContent = cfg.speed;
});

document.getElementById('sl-size').addEventListener('input', function () {
  cfg.size = parseInt(this.value);
  document.getElementById('lbl-size').textContent = cfg.size;
});

// Touch and mouse drag
function getCanvasPos(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const scale = arenaSize / rect.width;
  return {
    x: (clientX - rect.left) * scale,
    y: (clientY - rect.top) * scale,
  };
}

function startDrag(clientX, clientY) {
  const { x, y } = getCanvasPos(clientX, clientY);
  const r2 = (cfg.size * 1.2) ** 2;
  for (let i = 0; i < pieces.length; i++) {
    const p = pieces[i];
    if ((p.x - x) ** 2 + (p.y - y) ** 2 < r2) { dragIndex = i; break; }
  }
}

function moveDrag(clientX, clientY) {
  if (dragIndex === null) return;
  const { x, y } = getCanvasPos(clientX, clientY);
  pieces[dragIndex].x = x;
  pieces[dragIndex].y = y;
}

function endDrag() { dragIndex = null; }

canvas.addEventListener('mousedown', e => startDrag(e.clientX, e.clientY));
canvas.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
canvas.addEventListener('mouseup', endDrag);

canvas.addEventListener('touchstart', e => { e.preventDefault(); startDrag(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); moveDrag(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
canvas.addEventListener('touchend', endDrag);

window.addEventListener('resize', () => { resize(); initPieces(); });

// ── Logo upload ──────────────────────────────────────
let logoImage = null;
let logoPos = 'mid-center';
let logoOpacity = 1;
const MAX_LOGO_WIDTH = 200;

function drawLogo() {
  if (!logoImage) return;

  let w = logoImage.naturalWidth;
  let h = logoImage.naturalHeight;
  if (w > MAX_LOGO_WIDTH) { h = Math.round(h * MAX_LOGO_WIDTH / w); w = MAX_LOGO_WIDTH; }

  const pad = 12;
  const [vert, horiz] = logoPos.split('-');

  const x = horiz === 'left' ? pad
           : horiz === 'right' ? arenaSize - w - pad
           : (arenaSize - w) / 2;

  const y = vert === 'top' ? pad
           : vert === 'bottom' ? arenaSize - h - pad
           : (arenaSize - h) / 2;

  ctx.globalAlpha = logoOpacity;
  ctx.drawImage(logoImage, x, y, w, h);
  ctx.globalAlpha = 1;
}

document.getElementById('toggle-upload').addEventListener('change', function () {
  document.getElementById('upload-panel').classList.toggle('visible', this.checked);
});

document.getElementById('file-input').addEventListener('change', function () {
  const file = this.files[0];
  if (!file) return;
  const img = new Image();
  img.onload = () => {
    logoImage = img;
    document.getElementById('btn-remove-logo').style.display = 'inline-block';
  };
  img.src = URL.createObjectURL(file);
});

document.getElementById('btn-remove-logo').addEventListener('click', () => {
  logoImage = null;
  document.getElementById('file-input').value = '';
  document.getElementById('btn-remove-logo').style.display = 'none';
});

document.getElementById('sl-logo-opacity').addEventListener('input', function () {
  logoOpacity = parseInt(this.value) / 100;
  document.getElementById('lbl-logo-opacity').textContent = this.value + '%';
});

document.getElementById('position-grid').addEventListener('click', e => {
  const btn = e.target.closest('button[data-pos]');
  if (!btn) return;
  logoPos = btn.dataset.pos;
  document.querySelectorAll('#position-grid button').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
});

resize();
initPieces();
requestAnimationFrame(loop);
</script>
</body>
</html>
